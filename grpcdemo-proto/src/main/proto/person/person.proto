syntax = "proto3";

package person;

option java_package = "com.kafousis.grpcdemo.proto.person";
option java_multiple_files = true;

message Person {
  int32 age = 1;
  string first_name = 2;
  string last_name = 3;
  bytes small_picture = 4;
  bool is_profile_verified = 5;
  float height = 6;
  repeated string phone_numbers = 7;
  Date birthday = 9;
  EyeColor eye_color = 8;
  Address address = 10;
}

message Date {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
}

enum EyeColor {
  EYE_COLOR_UNKNOWN = 0; // default value
  EYE_GREEN = 1;
  EYE_BROWN = 2;
  EYE_BLUE = 3;
}

message Address {
  string address_line_1 = 1;
  string address_line_2 = 2;
  string zip_code = 3;
  string city = 4;
  string country = 5;
}