syntax = "proto3";

package com.github.kafousis.proto;

import 'date.proto';
import 'address.proto';
import 'eye_color.proto';

message Person {
  int32 age = 1;
  string first_name = 2;
  string last_name = 3;
  bytes small_picture = 4;
  bool is_profile_verified = 5;
  float height = 6;
  repeated string phone_numbers = 7;
  Date birthday = 9;
  EyeColor eye_color = 8;
  Address addresses = 10;
}

